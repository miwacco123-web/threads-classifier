<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threads分析システム🌱</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050d1a;min-height:100vh;font-family:'Hiragino Kaku Gothic Pro',sans-serif;color:#e0f0ff;padding:24px 16px}
.header{text-align:center;margin-bottom:24px}
.logo{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:6px}
.logo-text{font-size:13px;font-weight:600;letter-spacing:3px;color:#00ff88;text-transform:uppercase}
h1{font-size:20px;font-weight:600;color:#e0f0ff}
.sub{font-size:11px;color:#4a7a9b;letter-spacing:2px;margin-top:4px;text-transform:uppercase}
.scan{height:1px;background:linear-gradient(90deg,transparent,#00ff88,transparent);margin:20px 0;opacity:0.6}
.drop{border:1px solid #0d3a2a;border-radius:12px;background:#020c14;padding:36px 20px;text-align:center;cursor:pointer;margin-bottom:14px;transition:border-color 0.2s}
.drop:hover,.drop.over{border-color:#00ff88}
.drop-icon{font-size:30px;margin-bottom:8px}
.drop p{font-size:14px;color:#8ab8d0;font-weight:500}
.drop small{font-size:12px;color:#2a5a70;margin-top:4px;display:block}
.previews{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.previews img{width:48px;height:64px;object-fit:cover;border-radius:6px;border:1px solid #0d3a2a}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:1px;margin-bottom:8px;transition:all 0.2s}
.btn-main{background:#00ff88;color:#020c14}
.btn-main:disabled{background:#0d2a1e;color:#1a4a35;cursor:not-allowed}
.btn-csv{background:transparent;border:1px solid #00c8ff;color:#00c8ff}
.btn-reset{background:transparent;border:1px solid #0d3a2a;color:#4a7a9b}
.cats{display:flex;flex-direction:column;gap:6px;margin-top:14px}
.cat{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;border:1px solid}
.ci{background:rgba(0,200,255,0.05);border-color:rgba(0,200,255,0.15)}
.ck{background:rgba(0,255,136,0.05);border-color:rgba(0,255,136,0.15)}
.ct{background:rgba(255,200,0,0.05);border-color:rgba(255,200,0,0.15)}
.cm{background:rgba(100,120,140,0.05);border-color:rgba(100,120,140,0.15)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.di{background:#00c8ff}.dk{background:#00ff88}.dt{background:#ffc800}.dm{background:#4a6070}
.cat span{font-size:12px;color:#8ab8d0;letter-spacing:0.5px}
.progress-wrap{text-align:center;padding:40px 20px}
.prog-bar-bg{background:#0d2a1e;border-radius:4px;height:3px;margin:14px 0;overflow:hidden}
.prog-bar{height:3px;background:#00ff88;border-radius:4px;transition:width 0.3s;width:0%}
.prog-text{font-size:13px;color:#4a7a9b;letter-spacing:1px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.stat{background:#020c14;border:1px solid #0d3a2a;border-radius:10px;padding:14px;text-align:center}
.stat-num{font-size:26px;font-weight:600}
.ni .stat-num{color:#00c8ff}.nk .stat-num{color:#00ff88}.nt .stat-num{color:#ffc800}.nm .stat-num{color:#4a6070}
.stat-label{font-size:10px;color:#2a5a70;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.sec{margin-bottom:20px}
.sec-head{font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #0d3a2a}
.si .sec-head{color:#00c8ff}.sk .sec-head{color:#00ff88}.st .sec-head{color:#ffc800}
.rcard{display:flex;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:6px;border:1px solid;align-items:flex-start}
.rci{background:rgba(0,200,255,0.04);border-color:rgba(0,200,255,0.1)}
.rck{background:rgba(0,255,136,0.04);border-color:rgba(0,255,136,0.1)}
.rct{background:rgba(255,200,0,0.04);border-color:rgba(255,200,0,0.1)}
.rcard img{width:40px;height:54px;object-fit:cover;border-radius:5px;border:1px solid #0d3a2a;flex-shrink:0}
.racct{font-size:12px;font-weight:600;color:#00ff88}
.rmemo{font-size:12px;color:#8ab8d0;margin-top:2px}
.reng{font-size:11px;color:#2a5a70;margin-top:2px}
.hidden{display:none}
</style>
</head>
<body>
<div class="header">
  <div class="logo"><span class="logo-text">🌱 SproutUp</span></div>
  <h1>Threads 分析システム</h1>
  <p class="sub">AI-powered content classifier</p>
</div>
<div class="scan"></div>

<div id="uploadView">
  <div class="drop" id="dropZone">
    <div class="drop-icon">📱</div>
    <p>スクショをドロップ / タップして選択</p>
    <small>複数枚同時OK</small>
    <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
  </div>
  <div class="previews" id="previews"></div>
  <button class="btn btn-main" id="startBtn" disabled onclick="startClassify()">▶ 分析スタート</button>
  <div class="cats">
    <div class="cat ci"><div class="dot di"></div><span>INSIGHT — 数字・インサイト画面</span></div>
    <div class="cat ck"><div class="dot dk"></div><span>STRUCTURE — 構成が参考になる投稿</span></div>
    <div class="cat ct"><div class="dot dt"></div><span>THEME — テーマ・エピソードが参考</span></div>
    <div class="cat cm"><div class="dot dm"></div><span>ARCHIVE — コメ活（削除OK）</span></div>
  </div>
</div>

<div id="progressView" class="hidden">
  <div class="progress-wrap">
    <p class="prog-text" id="progText">ANALYZING...</p>
    <div class="prog-bar-bg"><div class="prog-bar" id="progBar"></div></div>
    <p style="font-size:11px;color:#1a4a35;margin-top:8px;letter-spacing:1px">AI PROCESSING</p>
  </div>
</div>

<div id="resultsView" class="hidden">
  <div class="stats" id="summary"></div>
  <div id="resultsList"></div>
  <button class="btn btn-csv" onclick="exportCSV()">↓ CSV エクスポート</button>
  <button class="btn btn-reset" onclick="resetAll()">↺ もう一度分析する</button>
</div>

<script>
const cats={
  insight:{label:'INSIGHT',sc:'si',rc:'rci'},
  neta_kosei:{label:'STRUCTURE',sc:'sk',rc:'rck'},
  neta_theme:{label:'THEME',sc:'st',rc:'rct'},
  kome:{label:'ARCHIVE',sc:'',rc:''}
};
const statCls={insight:'ni',neta_kosei:'nk',neta_theme:'nt',kome:'nm'};
let images=[],results=[];
const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('fileInput');
const startBtn=document.getElementById('startBtn');

dropZone.onclick=()=>fileInput.click();
dropZone.ondragover=e=>{e.preventDefault();dropZone.classList.add('over')};
dropZone.ondragleave=()=>dropZone.classList.remove('over');
dropZone.ondrop=e=>{e.preventDefault();dropZone.classList.remove('over');handleFiles(e.dataTransfer.files)};
fileInput.onchange=e=>handleFiles(e.target.files);

function handleFiles(files){
  Array.from(files).filter(f=>f.type.startsWith('image/')).forEach(f=>{
    const url=URL.createObjectURL(f);
    images.push({file:f,url});
    const img=document.createElement('img');
    img.src=url;
    document.getElementById('previews').appendChild(img);
  });
  startBtn.disabled=images.length===0;
}

function toBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

async function resizeImage(file){
  return new Promise(res=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const max=1000;
      let w=img.width,h=img.height;
      if(w>max){h=h*(max/w);w=max;}
      if(h>max){w=w*(max/h);h=max;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      res(canvas.toDataURL('image/jpeg',0.7).split(',')[1]);
    };
    img.src=url;
  });
}

async function startClassify(){
  document.getElementById('uploadView').classList.add('hidden');
  document.getElementById('progressView').classList.remove('hidden');
  results=[];
  for(let i=0;i<images.length;i++){
    const pct=Math.round((i/images.length)*100);
    document.getElementById('progBar').style.width=pct+'%';
    document.getElementById('progText').textContent=`ANALYZING ${i+1} / ${images.length}`;
    try{
      const b64=await resizeImage(images[i].file);
      const res=await fetch('/api/classify',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:500,
          messages:[{role:'user',content:[
            {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
            {type:'text',text:'このThreadsのスクリーンショットを分類してください。カテゴリ：insight（自分のインサイト数字画面）、neta_kosei（他者投稿で構成が参考になるもの）、neta_theme（他者投稿でテーマ・エピソードが参考になるもの）、kome（コメント欄・コメ活画面）。JSONのみ返答：{"category":"...","account":"...","memo":"20文字以内","engagement":"いいね数など"}'}
          ]}]
        })
      });
      const data=await res.json();
      const text=data.content?.map(c=>c.text||'').join('')||'{}';
      const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
      results.push({...parsed,url:images[i].url,index:i+1});
    }catch(e){
      results.push({category:'kome',account:'error',memo:'読み取り失敗',engagement:'',url:images[i].url,index:i+1});
    }
  }
  document.getElementById('progBar').style.width='100%';
  setTimeout(showResults,400);
}

function showResults(){
  document.getElementById('progressView').classList.add('hidden');
  document.getElementById('resultsView').classList.remove('hidden');
  const grouped={};
  Object.keys(cats).forEach(k=>grouped[k]=results.filter(r=>r.category===k));
  document.getElementById('summary').innerHTML=Object.entries(cats).map(([k,c])=>
    `<div class="stat ${statCls[k]}"><div class="stat-num">${grouped[k].length}</div><div class="stat-label">${c.label}</div></div>`
  ).join('');
  const list=document.getElementById('resultsList');
  list.innerHTML='';
  ['insight','neta_kosei','neta_theme'].forEach(k=>{
    if(!grouped[k].length)return;
    const c=cats[k];
    const sec=document.createElement('div');
    sec.className=`sec ${c.sc}`;
    sec.innerHTML=`<p class="sec-head">${c.label}</p>`;
    grouped[k].forEach(r=>{
      const card=document.createElement('div');
      card.className=`rcard ${c.rc}`;
      card.innerHTML=`<img src="${r.url}"><div><div class="racct">@${r.account||'—'}</div><div class="rmemo">${r.memo||''}</div>${r.engagement?`<div class="reng">♥ ${r.engagement}</div>`:''}</div>`;
      sec.appendChild(card);
    });
    list.appendChild(sec);
  });
}

function exportCSV(){
  const h='No,カテゴリ,アカウント,内容メモ,エンゲージメント\n';
  const rows=results.map(r=>`${r.index},${cats[r.category]?.label||r.category},${r.account||''},${r.memo||''},${r.engagement||''}`).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+h+rows],{type:'text/csv;charset=utf-8;'}));
  a.download='threads_analysis.csv';
  a.click();
}

function resetAll(){
  images=[];results=[];
  document.getElementById('previews').innerHTML='';
  document.getElementById('uploadView').classList.remove('hidden');
  document.getElementById('resultsView').classList.add('hidden');
  startBtn.disabled=true;
}
</script>
</body>
</html>
